<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Contact — UGC100</title>
<meta name="description" content="Get in touch with the UGC100 team. We'd love to hear from you.">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<style>
  @font-face { font-family: 'Geist'; src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Geist'; src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
  @font-face { font-family: 'Geist'; src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-SemiBold.woff2') format('woff2'); font-weight: 600; font-display: swap; }
  @font-face { font-family: 'Geist'; src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }

  :root {
    --bg: #f7f7f7;
    --white: #000000;
    --gray: #6b6b6b;
    --border: rgba(0,0,0,0.08);
    --accent: #1a9960;
    --accent-bright: #34d399;
    --accent-dim: rgba(26,153,96,0.1);
    --accent-gradient: linear-gradient(135deg, #1a9960, #34d399, #5ee8b7);
    --r-sm: 12px;
    --r-md: 16px;
    --r-pill: 80px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { max-width: 100%; overflow-x: hidden; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 5% 8%, rgba(26,153,96,0.14) 0%, transparent 50%),
      radial-gradient(ellipse 60% 50% at 95% 20%, rgba(52,211,153,0.11) 0%, transparent 50%),
      radial-gradient(ellipse 50% 40% at 70% 50%, rgba(26,153,96,0.1) 0%, transparent 50%);
    background-attachment: fixed;
    color: var(--gray);
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  ::selection { background: var(--accent); color: white; }

  .nav-logo {
    position: fixed; top: 16px; left: 16px; z-index: 1000;
    display: flex; align-items: center; gap: 10px; text-decoration: none;
  }
  .nav-logo img { width: 52px; height: 52px; }
  .nav-logo span { font-weight: 500; font-size: 16px; color: #000; }

  nav {
    position: fixed; top: 16px; right: 16px; z-index: 1000;
  }
  .nav-pill {
    display: flex; align-items: center; gap: 0;
    background: #111111; border-radius: var(--r-pill);
    padding: 8px 8px 8px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }
  .nav-pill a {
    color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; font-weight: 500;
    padding: 8px 16px; border-radius: var(--r-pill); transition: all 0.2s;
  }
  .nav-pill a:hover { color: #ffffff; background: rgba(255,255,255,0.08); }
  .nav-pill .nav-cta {
    background: var(--accent-gradient); color: #ffffff; margin-left: 4px;
  }
  .nav-pill .nav-cta:hover { filter: brightness(1.1); }

  .container { max-width: 640px; margin: 0 auto; padding: 0 16px; }

  .contact-page {
    flex: 1;
    padding: 160px 16px 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .contact-inner { width: 100%; max-width: 560px; }

  .contact-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .contact-header h1 {
    font-size: 40px; font-weight: 500; color: var(--white);
    letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 16px;
  }
  .contact-header p {
    font-size: 18px; line-height: 28px; color: var(--gray);
  }

  .contact-form {
    display: flex; flex-direction: column; gap: 16px;
  }
  .form-group {
    display: flex; flex-direction: column; gap: 6px;
  }
  .form-group label {
    font-size: 13px; font-weight: 600; color: var(--white);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .form-group input,
  .form-group textarea {
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    color: var(--white);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder {
    color: rgba(0,0,0,0.3);
  }
  .form-group textarea {
    resize: vertical; min-height: 140px;
  }

  .form-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }

  .btn-submit {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 16px 32px;
    background: var(--accent-gradient);
    color: #ffffff;
    border: none;
    border-radius: var(--r-pill);
    font-family: 'Geist', sans-serif;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(26,153,96,0.25);
    margin-top: 8px;
  }
  .btn-submit:hover {
    filter: brightness(1.1);
    box-shadow: 0 8px 30px rgba(26,153,96,0.35);
    transform: translateY(-2px);
  }

  .form-success {
    display: none;
    text-align: center;
    padding: 48px 24px;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    background: rgba(255,255,255,0.6);
  }
  .form-success.show { display: block; }
  .form-success .check {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: var(--accent);
    margin: 0 auto 20px;
  }
  .form-success h3 {
    font-size: 24px; font-weight: 500; color: var(--white); margin-bottom: 8px;
  }
  .form-success p { font-size: 15px; color: var(--gray); }
  .form-success a {
    display: inline-block; margin-top: 24px;
    color: var(--accent); text-decoration: none; font-weight: 500;
  }

  .contact-alt {
    text-align: center;
    margin-top: 40px;
    font-size: 14px;
    color: var(--gray);
  }
  .contact-alt a { color: var(--white); text-decoration: none; font-weight: 500; }

  footer {
    padding: 40px 16px;
    text-align: center;
    font-size: 13px;
    color: var(--gray);
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--gray); text-decoration: none; }
  footer a:hover { color: var(--white); }

  @media (max-width: 640px) {
    .contact-page { padding: 120px 16px 60px; }
    .contact-header h1 { font-size: 28px; letter-spacing: -1px; }
    .contact-header p { font-size: 16px; line-height: 24px; }
    .form-row { grid-template-columns: 1fr; }
    .btn-submit { border-radius: 12px; padding: 14px 24px; font-size: 14px; }
    .nav-pill a:not(.nav-cta) { display: none; }
    .nav-pill { padding: 6px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<a href="/" class="nav-logo">
  <img src="logo.png" alt="UGC100">
  <span>UGC100</span>
</a>
<nav>
  <div class="nav-pill">
    <a href="/">Home</a>
    <a href="/#pricing">Pricing</a>
    <a href="https://app.ugc100.com/signup" class="nav-cta">Get Started</a>
  </div>
</nav>

<div class="contact-page">
  <div class="contact-inner">
    <div class="contact-header">
      <h1>Get in <span style="color:var(--accent)">touch</span></h1>
      <p>We'll get back to you within a few hours.</p>
    </div>

    <form class="contact-form" id="contactForm" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY">
      <input type="hidden" name="subject" value="New contact from ugc100.com">
      <input type="hidden" name="redirect" value="https://ugc100.com/contact?success=true">
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input type="text" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@company.com" required>
        </div>
      </div>
      <div class="form-group">
        <label>Company</label>
        <input type="text" name="company" placeholder="Your company (optional)">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea name="message" placeholder="Tell us what you need..." required></textarea>
      </div>
      <button type="submit" class="btn-submit">Send message &rarr;</button>
    </form>

    <div class="form-success" id="formSuccess">
      <div class="check">&#10003;</div>
      <h3>Message sent</h3>
      <p>We'll get back to you within a few hours.</p>
      <a href="/">&larr; Back to UGC100</a>
    </div>

    <div class="contact-alt">
      Or email us directly at <a href="mailto:info@ugc100.com">info@ugc100.com</a>
    </div>
  </div>
</div>

<footer>
  <p>&copy; 2026 UGC100. All rights reserved. &middot; <a href="/">Home</a></p>
</footer>

<script>
// Show success state if redirected back
if (window.location.search.includes('success=true')) {
  document.getElementById('contactForm').style.display = 'none';
  document.getElementById('formSuccess').classList.add('show');
}
</script>
</body>
</html>
